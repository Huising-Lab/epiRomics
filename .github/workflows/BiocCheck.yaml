on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

name: BiocCheck

permissions: read-all

# This workflow mirrors what the Bioconductor Single Package Builder (SPB)
# runs. It uses the official bioconductor/bioconductor_docker:devel image
# (same R + Bioc devel combo the SPB uses), builds the tarball, runs
# `R CMD check --no-manual` on the tarball, then BiocCheckGitClone on the
# source tree and BiocCheck on the tarball with new-package = TRUE (since
# epiRomics is a first-time submission). Any SPB-level error fails the job.

jobs:
  BiocCheck:
    runs-on: ubuntu-latest

    container:
      image: bioconductor/bioconductor_docker:devel

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: false
      # Opt into Node.js 24 for GHA actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Query R and Bioc versions
        run: |
          R --version
          Rscript -e 'BiocManager::version()'

      - name: Install package dependencies
        run: |
          Rscript -e 'if (!requireNamespace("remotes", quietly = TRUE)) install.packages("remotes", repos = BiocManager::repositories())'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, repos = BiocManager::repositories(), upgrade = "never")'
          Rscript -e 'if (!requireNamespace("BiocCheck", quietly = TRUE)) BiocManager::install("BiocCheck", ask = FALSE, update = FALSE)'

      - name: BiocCheckGitClone (source tree)
        run: |
          Rscript -e 'BiocCheck::BiocCheckGitClone()'

      - name: R CMD build
        run: |
          R CMD build .
          ls -la epiRomics_*.tar.gz

      - name: R CMD check (on tarball, --no-manual like SPB)
        run: |
          TARBALL=$(ls -1 epiRomics_*.tar.gz | head -n 1)
          R CMD check --no-manual --timings "$TARBALL"

      - name: BiocCheck (on tarball, new-package = TRUE)
        run: |
          TARBALL=$(ls -1 epiRomics_*.tar.gz | head -n 1)
          Rscript -e "BiocCheck::BiocCheck('${TARBALL}', \`new-package\` = TRUE, \`quit-with-status\` = TRUE)"
