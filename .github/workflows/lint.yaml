on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  workflow_dispatch:

name: lint-workflows

permissions: read-all

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_on_error: true
