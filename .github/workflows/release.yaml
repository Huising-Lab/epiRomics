on:
  push:
    tags:
      - 'v*'

name: release

permissions:
  contents: write

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'release', args: 'c("--no-manual")',                       build_args: 'c("--no-manual")'}
          - {os: ubuntu-latest,   r: 'devel',   args: 'c("--no-manual")',                       build_args: 'c("--no-manual")', http-user-agent: 'release'}
          - {os: macos-latest,    r: 'release', args: 'c("--no-manual")',                       build_args: 'c("--no-manual")'}
          # Windows: build + install only (kent BigWig URL parser fails vignette/tests/examples on GHA).
          - {os: windows-latest,  r: 'release', args: 'c("--no-manual", "--no-tests", "--ignore-vignettes", "--no-examples")', build_args: 'c("--no-manual", "--no-build-vignettes")'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Opt into Node.js 24 for GHA actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: ${{ matrix.config.args }}
          upload-snapshots: true
          build_args: ${{ matrix.config.build_args }}

  create-release:
    needs: R-CMD-check
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # Opt into Node.js 24 for GHA actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::BiocFileCache
          needs: check

      - name: Build package
        run: R CMD build .

      - name: Build PDF manual
        run: |
          pkg=$(ls *.tar.gz)
          R CMD Rd2pdf --batch --no-preview --force -o epiRomics-manual.pdf ${pkg%.tar.gz}/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            epiRomics-manual.pdf
